# pip install pre-commit && pre-commit install (una vez por clon del repo)
# No corre mypy aca -- es mas lento y necesita el entorno completo instalado;
# se corre a mano (`mypy src desktop main.py`) o en CI, no en cada commit.
exclude: ^old/

repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
