name: Build for macOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install all dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        python -m pip install pyarmor pyinstaller cryptography pymysql requests playwright pillow pywebview flask werkzeug jinja2 itsdangerous click markupsafe

    - name: Install Playwright browsers
      run: |
        python -m playwright install --with-deps chromium

    - name: Convert icon to .icns using Python
      run: |
        # Crear un script Python para convertir el icono
        cat > convert_icon.py << 'EOF'
        import os
        from PIL import Image
        import subprocess
        import tempfile

        # Abrir el icono .ico
        icon_path = 'assets/icon.ico'
        if not os.path.exists(icon_path):
            print(f"No se encontró {icon_path}")
            exit(1)

        # Crear carpeta para el iconset
        iconset_dir = 'assets/icon.iconset'
        os.makedirs(iconset_dir, exist_ok=True)

        # Tamaños necesarios para macOS .icns
        sizes = [16, 32, 64, 128, 256, 512]

        # Cargar el icono
        img = Image.open(icon_path)
        
        # Guardar cada tamaño
        for size in sizes:
            # Redimensionar manteniendo relación de aspecto
            resized = img.resize((size, size), Image.Resampling.LANCZOS)
            # Guardar como PNG
            png_path = os.path.join(iconset_dir, f'icon_{size}x{size}.png')
            resized.save(png_path, 'PNG')
            print(f"Creado: {png_path}")

        # Crear el archivo .icns
        icns_path = 'assets/icon.icns'
        cmd = ['iconutil', '-c', 'icns', iconset_dir, '-o', icns_path]
        result = subprocess.run(cmd, capture_output=True, text=True)
        
        if result.returncode == 0:
            print(f"Icono convertido a: {icns_path}")
        else:
            print(f"Error al convertir: {result.stderr}")
            exit(1)
        EOF

        # Ejecutar el script
        python convert_icon.py

    - name: Obfuscate all modules
      run: |
        mkdir -p dist
        for mod in launcher.py auth_module.py ui_embedded.py grok_multi.py vf_db_connection.py vf_db_interact.py vf_db_sync.py; do
          if [ -f "$mod" ]; then
            echo "Ofuscando $mod..."
            pyarmor gen --obf-code 2 -O dist "$mod"
          else
            echo " Archivo $mod no encontrado"
          fi
        done

    - name: List obfuscated files
      run: |
        echo " Archivos en dist/:"
        ls -la dist/

    - name: Build with PyInstaller
      run: |
        python -m PyInstaller \
          --onefile \
          --windowed \
          --name IVR_2.5 \
          --icon assets/icon.icns \
          --add-data "cookies:cookies" \
          --add-data "jobs:jobs" \
          --add-data "meta_accounts:meta_accounts" \
          --add-data "gentube_cookies:gentube_cookies" \
          --add-data "grok-animator2.0:grok-animator2.0" \
          --add-data "whisk_downloads:whisk_downloads" \
          --add-data "Build and Instructions:Build and Instructions" \
          --add-data "dist/auth_module.py:." \
          --add-data "dist/ui_embedded.py:." \
          --add-data "dist/grok_multi.py:." \
          --add-data "dist/vf_db_connection.py:." \
          --add-data "dist/vf_db_interact.py:." \
          --add-data "dist/vf_db_sync.py:." \
          --distpath dist_final \
          dist/launcher.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: IVR-2.5-macOS
        path: dist_final/IVR_2.5