name: Build for macOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install all dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        python -m pip install pyinstaller cryptography pymysql requests playwright pillow pywebview flask werkzeug jinja2 itsdangerous click markupsafe

    - name: Install Playwright browsers
      run: |
        python -m playwright install --with-deps chromium

    - name: Convert icon to .icns using Python
      run: |
        cat > convert_icon.py << 'EOF'
        import os
        from PIL import Image
        import subprocess
        import shutil

        icon_path = 'assets/icon.ico'
        if not os.path.exists(icon_path):
            print(f" No se encontró {icon_path}")
            exit(1)

        iconset_dir = 'assets/icon.iconset'
        os.makedirs(iconset_dir, exist_ok=True)

        sizes = [(16, 16), (32, 32), (64, 64), (128, 128), (256, 256), (512, 512)]

        try:
            img = Image.open(icon_path)
            print(f" Icono cargado: {img.size} {img.mode}")
            
            for w, h in sizes:
                resized = img.resize((w, h), Image.Resampling.LANCZOS)
                png_path = os.path.join(iconset_dir, f'icon_{w}x{h}.png')
                resized.save(png_path, 'PNG')
                print(f" Creado: {png_path}")

            icns_path = 'assets/icon.icns'
            if shutil.which('iconutil'):
                cmd = ['iconutil', '-c', 'icns', iconset_dir, '-o', icns_path]
                result = subprocess.run(cmd, capture_output=True, text=True)
                if result.returncode == 0 and os.path.exists(icns_path):
                    print(f" Icono convertido a: {icns_path}")
                else:
                    print(f" Error al convertir: {result.stderr}")
                    exit(1)
            else:
                print(" iconutil no encontrado")
                exit(1)
        except Exception as e:
            print(f" Error: {e}")
            exit(1)
        EOF

        python convert_icon.py

    - name: Create required directories
      run: |
        mkdir -p cookies jobs meta_accounts gentube_cookies grok-animator2.0 whisk_downloads "Build and Instructions"
        touch cookies/placeholder.txt
        touch jobs/placeholder.txt
        touch meta_accounts/placeholder.txt
        touch gentube_cookies/placeholder.txt
        touch grok-animator2.0/placeholder.txt
        touch whisk_downloads/placeholder.txt
        touch "Build and Instructions/placeholder.txt"

    - name: Build with PyInstaller as .app bundle
      run: |
        python -m PyInstaller \
          --onedir \
          --windowed \
          --name IVR_2.5 \
          --icon assets/icon.icns \
          --add-data "cookies:cookies" \
          --add-data "jobs:jobs" \
          --add-data "meta_accounts:meta_accounts" \
          --add-data "gentube_cookies:gentube_cookies" \
          --add-data "grok-animator2.0:grok-animator2.0" \
          --add-data "whisk_downloads:whisk_downloads" \
          --add-data "Build and Instructions:Build and Instructions" \
          --distpath dist_final \
          launcher.py

    - name: Create .app bundle
      run: |
        # Crear la estructura de .app
        APP_NAME="IVR_2.5.app"
        APP_DIR="$APP_NAME/Contents"
        
        mkdir -p "$APP_DIR/MacOS"
        mkdir -p "$APP_DIR/Resources"
        
        # Encontrar el ejecutable dentro de la carpeta dist_final/IVR_2.5/
        # PyInstaller con --onedir crea una carpeta con el nombre del programa
        if [ -d "dist_final/IVR_2.5" ]; then
          # Si es un directorio, buscar el ejecutable dentro
          EXECUTABLE=$(find dist_final/IVR_2.5 -name "IVR_2.5" -type f -perm +111 | head -1)
          if [ -z "$EXECUTABLE" ]; then
            # Si no encuentra por permisos, buscar cualquier archivo llamado IVR_2.5
            EXECUTABLE=$(find dist_final/IVR_2.5 -name "IVR_2.5" -type f | head -1)
          fi
        else
          # Si es un archivo directo
          EXECUTABLE="dist_final/IVR_2.5"
        fi
        
        echo "Ejecutable encontrado: $EXECUTABLE"
        
        # Copiar el ejecutable
        cp "$EXECUTABLE" "$APP_DIR/MacOS/"
        chmod +x "$APP_DIR/MacOS/IVR_2.5"
        
        # Copiar el icono
        cp assets/icon.icns "$APP_DIR/Resources/"
        
        # Crear Info.plist
        cat > "$APP_DIR/Info.plist" << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleName</key>
            <string>IVR 2.5</string>
            <key>CFBundleDisplayName</key>
            <string>IVR 2.5</string>
            <key>CFBundleIdentifier</key>
            <string>com.videoforge.ivr25</string>
            <key>CFBundleVersion</key>
            <string>2.5.0</string>
            <key>CFBundleShortVersionString</key>
            <string>2.5.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleSignature</key>
            <string>????</string>
            <key>CFBundleExecutable</key>
            <string>IVR_2.5</string>
            <key>CFBundleIconFile</key>
            <string>icon.icns</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
        </dict>
        </plist>
        EOF
        
        # Crear el archivo PkgInfo
        echo "APPL????" > "$APP_DIR/PkgInfo"

    - name: Create .dmg installer
      run: |
        # Instalar create-dmg
        brew install create-dmg
        
        # Crear el DMG
        create-dmg \
          --volname "IVR 2.5" \
          --window-pos 200 120 \
          --window-size 800 400 \
          --icon-size 100 \
          --icon "IVR_2.5.app" 200 190 \
          --app-drop-link 600 185 \
          "IVR_2.5.dmg" \
          "IVR_2.5.app"

    - name: Upload .app artifact
      uses: actions/upload-artifact@v4
      with:
        name: IVR-2.5-app
        path: IVR_2.5.app

    - name: Upload .dmg artifact
      uses: actions/upload-artifact@v4
      with:
        name: IVR-2.5-dmg
        path: IVR_2.5.dmg