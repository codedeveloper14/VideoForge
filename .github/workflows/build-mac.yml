name: Build for macOS

# Solo manual (workflow_dispatch): a diferencia de la version anterior de este
# archivo, no corre en cada push a main. Motivos: (1) prioridad confirmada del
# proyecto es terminar el instalador de Windows primero, Mac despues -- no
# tiene sentido gastar minutos de Actions en cada commit mientras Mac ni se ha
# probado una vez; (2) este workflow fue reescrito de cero contra el layout
# actual (src/ + frontend/dist + PyArmor) y todavia NO se corrio ni una vez en
# un runner real -- ver notas de riesgo abajo antes de dispararlo.
#
# Riesgos conocidos, sin verificar (documentados para quien lo corra primero):
#   - PyArmor: `pip install pyarmor` en el runner instala el software pero no
#     una licencia -- corre en modo trial (limite de archivos) hasta que se
#     registra. Se agrego un paso "Register PyArmor license" que usa el
#     secret PYARMOR_LICENSE (contenido de ~/.pyarmor/license.lic de la
#     maquina de desarrollo, subido via `gh secret set`, nunca commiteado al
#     repo publico) y corre `pyarmor reg` antes de obfuscar. Riesgo real sin
#     confirmar: esta licencia Basic tiene "CI/CD Mode: No", lo que
#     probablemente significa que esta pensada para un solo dispositivo activo
#     -- registrarla en un runner efimero podria fallar, gastar intentos de
#     activacion limitados, o des-registrar la maquina Windows. Si el paso de
#     registro falla o rompe el registro local, la opcion de respaldo es
#     compilar Mac localmente en hardware real (mismo patron que Windows) en
#     vez de por CI. Ver [[project-production-requirements]] (nota
#     "Obfuscation tool decision") para el detalle completo.
#   - pywebview + pyobjc (backend nativo Cocoa/WebKit) nunca se probo en Mac
#     real durante todo este proyecto -- ver [[project-refactor-plan]].
#   - No hay firma de codigo todavia (Apple Developer Program comprado,
#     certificado Developer ID Application sin generar) -- ver
#     [[project-code-signing]]. El .app/.dmg que produce este workflow sale
#     sin firmar y sin notarizar: Gatekeeper lo va a bloquear en la Mac de
#     cualquier usuario final hasta que se firme.
#
# Build por arquitectura nativa (no universal2): cada job corre en un runner
# cuyo Python ya es arm64 o x86_64 nativo, asi que PyInstaller no necesita
# cross-compilar ni depende de que cada dependencia nativa (playwright,
# curl_cffi, oss2, psutil, pyobjc) tenga wheels universal2 -- ver
# studioivr-mac.spec para el detalle. Resultado: dos instaladores separados,
# uno por arquitectura, no un solo binario fat.

on:
  workflow_dispatch:

jobs:
  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    name: build (${{ matrix.arch }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Register PyArmor license
        id: pyarmor_reg
        continue-on-error: true
        # El secret esta en base64 (no texto plano): echo/YAML pueden alterar
        # saltos de linea o espacios de un archivo de licencia de una sola
        # linea sin salto -- PyArmor lo rechaza silenciosamente si el
        # contenido no es byte-a-byte identico. base64 viaja intacto por
        # cualquier capa (shell/YAML) y se decodifica exacto del otro lado.
        # Sigue fallando con "invalid activation file": el archivo que
        # tenemos localmente (~/.pyarmor/license.lic) probablemente es el
        # estado post-registro de PyArmor, no un archivo de activacion
        # reutilizable -- pendiente encontrar/re-descargar el original. No
        # bloquea el resto del pipeline (ver el paso siguiente).
        env:
          PYARMOR_LICENSE_B64: ${{ secrets.PYARMOR_LICENSE_B64 }}
        run: |
          python3 -c "import base64, os; open('/tmp/license.lic', 'wb').write(base64.b64decode(os.environ['PYARMOR_LICENSE_B64']))"
          pyarmor reg /tmp/license.lic
          rm -f /tmp/license.lic

      - name: Obfuscate with PyArmor
        if: steps.pyarmor_reg.outcome == 'success'
        run: |
          pyarmor gen -O build/pyarmor_dist -r main.py src desktop scripts

      - name: Fallback -- copiar sin ofuscar (SOLO diagnostico)
        # Se ejecuta unicamente si el registro de PyArmor de arriba fallo,
        # para poder seguir probando el resto del pipeline (PyInstaller +
        # pyobjc/pywebview + create-dmg, nunca corrido en Mac real) sin
        # quedar bloqueados por la licencia. build/pyarmor_dist necesita
        # exactamente esta forma (mismo root que pyarmor gen habria escrito)
        # porque studioivr-mac.spec lee de ahi sin importar el origen.
        # El .app que sale de esta rama NO esta ofuscado -- no es el build
        # real para distribuir, solo sirve para validar que la app arranca.
        if: steps.pyarmor_reg.outcome != 'success'
        run: |
          mkdir -p build/pyarmor_dist
          cp main.py build/pyarmor_dist/
          cp -r src desktop scripts build/pyarmor_dist/
          mkdir -p build/pyarmor_dist/pyarmor_runtime_012301
          echo "PLACEHOLDER -- este build no esta ofuscado, ver el paso 'Register PyArmor license'" > build/pyarmor_dist/pyarmor_runtime_012301/README.txt

      - name: Build .app with PyInstaller
        run: python -m PyInstaller studioivr-mac.spec --noconfirm

      - name: Create .dmg installer
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Studio IVR" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "Studio IVR.app" 200 190 \
            --app-drop-link 600 185 \
            "dist/Studio IVR (${{ matrix.arch }}).dmg" \
            "dist/Studio IVR.app"

      # El sufijo del nombre delata si esta ofuscado o no -- para que nadie
      # confunda por error un build de diagnostico con el real distribuible.
      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudioIVR-mac-${{ matrix.arch }}-app-${{ steps.pyarmor_reg.outcome == 'success' && 'obfuscated' || 'UNOBFUSCATED-DIAGNOSTIC' }}
          path: "dist/Studio IVR.app"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudioIVR-mac-${{ matrix.arch }}-dmg-${{ steps.pyarmor_reg.outcome == 'success' && 'obfuscated' || 'UNOBFUSCATED-DIAGNOSTIC' }}
          path: "dist/Studio IVR (${{ matrix.arch }}).dmg"
