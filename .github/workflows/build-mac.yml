name: Build for macOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install all dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        python -m pip install pyinstaller cryptography pymysql requests playwright pillow pywebview flask werkzeug jinja2 itsdangerous click markupsafe

    - name: Install Playwright browsers
      run: |
        python -m playwright install --with-deps chromium

    - name: Convert icon to .icns using Python
      run: |
        # Crear script Python para convertir el icono
        cat > convert_icon.py << 'EOF'
        import os
        from PIL import Image
        import subprocess
        import shutil

        # Verificar que el icono existe
        icon_path = 'assets/icon.ico'
        if not os.path.exists(icon_path):
            print(f" No se encontró {icon_path}")
            exit(1)

        # Crear carpeta para el iconset
        iconset_dir = 'assets/icon.iconset'
        os.makedirs(iconset_dir, exist_ok=True)

        # Tamaños necesarios para macOS .icns
        sizes = [
            (16, 16),
            (32, 32),
            (64, 64),
            (128, 128),
            (256, 256),
            (512, 512)
        ]

        try:
            # Cargar el icono
            img = Image.open(icon_path)
            print(f" Icono cargado: {img.size} {img.mode}")
            
            # Guardar cada tamaño
            for w, h in sizes:
                # Redimensionar manteniendo relación de aspecto
                resized = img.resize((w, h), Image.Resampling.LANCZOS)
                # Guardar como PNG
                png_path = os.path.join(iconset_dir, f'icon_{w}x{h}.png')
                resized.save(png_path, 'PNG')
                print(f" Creado: {png_path}")

            # Crear el archivo .icns usando iconutil
            icns_path = 'assets/icon.icns'
            
            # Verificar que iconutil está disponible
            if shutil.which('iconutil'):
                cmd = ['iconutil', '-c', 'icns', iconset_dir, '-o', icns_path]
                result = subprocess.run(cmd, capture_output=True, text=True)
                
                if result.returncode == 0 and os.path.exists(icns_path):
                    print(f" Icono convertido a: {icns_path}")
                else:
                    print(f" Error al convertir: {result.stderr}")
                    exit(1)
            else:
                print(" iconutil no encontrado")
                exit(1)
                
        except Exception as e:
            print(f" Error: {e}")
            exit(1)
        EOF

        # Ejecutar el script
        python convert_icon.py

    - name: Build with PyInstaller (SIN OFUSCACIÓN)
      run: |
        python -m PyInstaller \
          --onefile \
          --windowed \
          --name IVR_2.5 \
          --icon assets/icon.icns \
          --add-data "cookies:cookies" \
          --add-data "jobs:jobs" \
          --add-data "meta_accounts:meta_accounts" \
          --add-data "gentube_cookies:gentube_cookies" \
          --add-data "grok-animator2.0:grok-animator2.0" \
          --add-data "whisk_downloads:whisk_downloads" \
          --add-data "Build and Instructions:Build and Instructions" \
          --distpath dist_final \
          launcher.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: IVR-2.5-macOS
        path: dist_final/IVR_2.5