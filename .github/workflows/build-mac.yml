name: Build for macOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install all dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        python -m pip install pyinstaller pyarmor cryptography pymysql requests playwright pillow pywebview flask werkzeug jinja2 itsdangerous click markupsafe bcrypt replicate

    - name: Register PyArmor license
      run: |
        pyarmor register -p StudioIVR "${{ secrets.PYARMOR_LICENSE }}"

    - name: Install Playwright browsers
      run: |
        python -m playwright install --with-deps chromium

    - name: Convert icon to .icns using Python
      run: |
        cat > convert_icon.py << 'EOF'
        import os
        from PIL import Image
        import subprocess
        import shutil

        icon_path = 'assets/icon.ico'
        if not os.path.exists(icon_path):
            print(f"❌ No se encontró {icon_path}")
            exit(1)

        iconset_dir = 'assets/icon.iconset'
        os.makedirs(iconset_dir, exist_ok=True)

        sizes = [(16, 16), (32, 32), (64, 64), (128, 128), (256, 256), (512, 512)]

        try:
            img = Image.open(icon_path)
            print(f"✅ Icono cargado: {img.size} {img.mode}")
            
            for w, h in sizes:
                resized = img.resize((w, h), Image.Resampling.LANCZOS)
                png_path = os.path.join(iconset_dir, f'icon_{w}x{h}.png')
                resized.save(png_path, 'PNG')
                print(f"✅ Creado: {png_path}")

            icns_path = 'assets/icon.icns'
            if shutil.which('iconutil'):
                cmd = ['iconutil', '-c', 'icns', iconset_dir, '-o', icns_path]
                result = subprocess.run(cmd, capture_output=True, text=True)
                if result.returncode == 0 and os.path.exists(icns_path):
                    print(f"✅ Icono convertido a: {icns_path}")
                else:
                    print(f"❌ Error al convertir: {result.stderr}")
                    exit(1)
            else:
                print("❌ iconutil no encontrado")
                exit(1)
        except Exception as e:
            print(f"❌ Error: {e}")
            exit(1)
        EOF

        python convert_icon.py

    - name: Create required directories
      run: |
        mkdir -p cookies jobs meta_accounts gentube_cookies grok-animator2.0 whisk_downloads "Build and Instructions"
        touch cookies/placeholder.txt
        touch jobs/placeholder.txt
        touch meta_accounts/placeholder.txt
        touch gentube_cookies/placeholder.txt
        touch grok-animator2.0/placeholder.txt
        touch whisk_downloads/placeholder.txt
        touch "Build and Instructions/placeholder.txt"

    - name: Obfuscate all modules
      run: |
        mkdir -p dist_ofuscado
        for mod in launcher.py auth_module.py ui_embedded.py grok_multi.py vf_db_connection.py vf_db_interact.py vf_db_sync.py; do
          if [ -f "$mod" ]; then
            echo "Ofuscando $mod..."
            pyarmor gen --obf-code 2 -O dist_ofuscado "$mod"
          fi
        done

    - name: Copy flow_extension to dist_ofuscado
      run: |
        if [ -d "flow_extension" ]; then
          echo "📦 Copiando flow_extension..."
          cp -r flow_extension dist_ofuscado/
        else
          echo "⚠️  No se encontró flow_extension. Saltando..."
        fi

    - name: Build with PyInstaller (optimized)
      run: |
        python -m PyInstaller \
          --onefile \
          --windowed \
          --name IVR_2.5 \
          --icon assets/icon.icns \
          --strip \
          --hidden-import bcrypt \
          --hidden-import replicate \
          --hidden-import webview \
          --hidden-import webview.platforms \
          --hidden-import webview.platforms.winforms \
          --hidden-import webview.platforms.winforms.webview \
          --hidden-import tkinter \
          --hidden-import tkinter.ttk \
          --hidden-import tkinter.messagebox \
          --hidden-import dotenv \
          --hidden-import flask \
          --hidden-import werkzeug \
          --hidden-import jinja2 \
          --hidden-import itsdangerous \
          --hidden-import click \
          --hidden-import markupsafe \
          --hidden-import requests \
          --hidden-import pymysql \
          --hidden-import cryptography \
          --hidden-import playwright \
          --hidden-import PIL \
          --collect-all webview \
          --collect-all flask \
          --collect-all bcrypt \
          --collect-all replicate \
          --add-data "cookies:cookies" \
          --add-data "jobs:jobs" \
          --add-data "meta_accounts:meta_accounts" \
          --add-data "gentube_cookies:gentube_cookies" \
          --add-data "grok-animator2.0:grok-animator2.0" \
          --add-data "whisk_downloads:whisk_downloads" \
          --add-data "Build and Instructions:Build and Instructions" \
          --add-data "dist_ofuscado/flow_extension:flow_extension" \
          --add-data "dist_ofuscado/auth_module.py:." \
          --add-data "dist_ofuscado/ui_embedded.py:." \
          --add-data "dist_ofuscado/grok_multi.py:." \
          --add-data "dist_ofuscado/vf_db_connection.py:." \
          --add-data "dist_ofuscado/vf_db_interact.py:." \
          --add-data "dist_ofuscado/vf_db_sync.py:." \
          --distpath dist_final \
          dist_ofuscado/launcher.py

    - name: Create .app bundle
      run: |
        APP_NAME="IVR_2.5.app"
        APP_DIR="$APP_NAME/Contents"
        
        mkdir -p "$APP_DIR/MacOS"
        mkdir -p "$APP_DIR/Resources"
        
        if [ -d "dist_final/IVR_2.5" ]; then
          EXECUTABLE=$(find dist_final/IVR_2.5 -name "IVR_2.5" -type f -perm +111 | head -1)
          if [ -z "$EXECUTABLE" ]; then
            EXECUTABLE=$(find dist_final/IVR_2.5 -name "IVR_2.5" -type f | head -1)
          fi
        else
          EXECUTABLE="dist_final/IVR_2.5"
        fi
        
        echo "Ejecutable encontrado: $EXECUTABLE"
        
        cp "$EXECUTABLE" "$APP_DIR/MacOS/"
        chmod +x "$APP_DIR/MacOS/IVR_2.5"
        cp assets/icon.icns "$APP_DIR/Resources/"
        
        cat > "$APP_DIR/Info.plist" << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleName</key>
            <string>IVR 2.5</string>
            <key>CFBundleDisplayName</key>
            <string>IVR 2.5</string>
            <key>CFBundleIdentifier</key>
            <string>com.videoforge.ivr25</string>
            <key>CFBundleVersion</key>
            <string>2.5.0</string>
            <key>CFBundleShortVersionString</key>
            <string>2.5.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleSignature</key>
            <string>????</string>
            <key>CFBundleExecutable</key>
            <string>IVR_2.5</string>
            <key>CFBundleIconFile</key>
            <string>icon.icns</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
        </dict>
        </plist>
        EOF
        
        echo "APPL????" > "$APP_DIR/PkgInfo"

    - name: Create .dmg installer
      run: |
        brew install create-dmg
        create-dmg \
          --volname "IVR 2.5" \
          --window-pos 200 120 \
          --window-size 800 400 \
          --icon-size 100 \
          --icon "IVR_2.5.app" 200 190 \
          --app-drop-link 600 185 \
          "IVR_2.5.dmg" \
          "IVR_2.5.app"

    - name: Upload .app artifact
      uses: actions/upload-artifact@v4
      with:
        name: IVR-2.5-app
        path: IVR_2.5.app

    - name: Upload .dmg artifact
      uses: actions/upload-artifact@v4
      with:
        name: IVR-2.5-dmg
        path: IVR_2.5.dmg